<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'nonce-__NONCE__'; script-src 'nonce-__NONCE__';"
    />
    <title>TailEvents</title>
    <style nonce="__NONCE__">
        :root {
            color-scheme: light dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-editor-font-size);
            line-height: 1.5;
        }

        #app {
            padding: 16px;
        }

        .hidden {
            display: none !important;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .mode-button,
        .action-button,
        .retry-button {
            border: 1px solid var(--vscode-list-hoverBackground);
            background: transparent;
            color: inherit;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font: inherit;
        }

        .mode-button.active {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border-color: var(--vscode-button-background);
        }

        .action-button.primary {
            background: var(--vscode-button-background);
            color: var(--vscode-button-foreground);
            border-color: var(--vscode-button-background);
        }

        .mode-button:disabled,
        .action-button:disabled,
        .retry-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .title-bar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--vscode-list-hoverBackground);
        }

        h2,
        h3,
        p,
        ul,
        pre,
        textarea {
            margin: 0;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .muted {
            color: var(--vscode-descriptionForeground, var(--vscode-editor-foreground));
            opacity: 0.8;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            background: var(--vscode-badge-background);
            color: var(--vscode-badge-foreground);
            font-size: 0.9em;
        }

        .lead {
            font-size: 1.05em;
            font-weight: 600;
        }

        .text-block {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .timeline,
        .related-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .timeline-item,
        .related-item,
        .output-panel,
        .input-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 12px;
            border: 1px solid var(--vscode-list-hoverBackground);
            border-radius: 8px;
            background: transparent;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            border: none;
            padding: 0;
            background: transparent;
            color: var(--vscode-textLink-foreground);
            cursor: pointer;
            text-align: left;
            font: inherit;
        }

        .link-button:hover {
            text-decoration: underline;
        }

        .state {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        textarea,
        pre {
            width: 100%;
            border: 1px solid var(--vscode-input-border, var(--vscode-list-hoverBackground));
            border-radius: 6px;
            padding: 10px;
            background: var(--vscode-input-background, transparent);
            color: var(--vscode-input-foreground, inherit);
            font: inherit;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        pre {
            min-height: 180px;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="mode-switch">
            <button id="mode-explain" class="mode-button active" type="button">Explain</button>
            <button id="mode-code" class="mode-button" type="button">Code</button>
        </div>

        <section id="explain-panel" class="panel">
            <section id="empty-state" class="state hidden">
                <p id="empty-text" class="muted"></p>
            </section>

            <section id="loading-state" class="state hidden">
                <p id="loading-text"></p>
            </section>

            <section id="error-state" class="state hidden">
                <p id="error-text"></p>
                <button id="retry-button" class="retry-button" type="button">Retry</button>
            </section>

            <section id="content" class="hidden">
                <header class="title-bar">
                    <div class="row">
                        <h2 id="entity-name"></h2>
                        <span id="entity-type" class="badge"></span>
                    </div>
                    <p id="entity-location" class="muted"></p>
                    <p id="entity-signature" class="text-block hidden"></p>
                    <p id="event-count" class="muted"></p>
                </header>

                <section class="section">
                    <h3>Explanation</h3>
                    <p id="summary-text" class="lead hidden"></p>
                    <p id="detail-text" class="text-block hidden"></p>
                </section>

                <section class="section">
                    <h3>History</h3>
                    <p id="history-fallback" class="muted hidden">History unavailable.</p>
                    <ul id="timeline-list" class="timeline"></ul>
                </section>

                <section class="section">
                    <h3>Related Entities</h3>
                    <p id="related-empty" class="muted hidden">No related entities.</p>
                    <ul id="related-list" class="related-list"></ul>
                </section>
            </section>
        </section>

        <section id="code-panel" class="panel hidden">
            <section class="input-panel">
                <h3>Current File</h3>
                <p id="code-file-path" class="muted">No file selected.</p>
            </section>

            <section class="input-panel">
                <h3>Prompt</h3>
                <textarea id="code-prompt" placeholder="Describe the change you want."></textarea>
                <div class="row">
                    <button id="run-button" class="action-button primary" type="button">Run</button>
                    <button id="cancel-button" class="action-button" type="button">Cancel</button>
                    <button id="apply-button" class="action-button" type="button">Apply</button>
                    <button id="retry-event-button" class="action-button" type="button">Retry Event Write</button>
                </div>
                <p id="code-status" class="muted"></p>
            </section>

            <section class="output-panel">
                <h3>Stream Output</h3>
                <pre id="code-output"></pre>
            </section>
        </section>
    </div>

    <script nonce="__NONCE__">
        const vscode = acquireVsCodeApi();

        const explainPanel = document.getElementById("explain-panel");
        const codePanel = document.getElementById("code-panel");
        const modeExplainButton = document.getElementById("mode-explain");
        const modeCodeButton = document.getElementById("mode-code");

        const content = document.getElementById("content");
        const emptyState = document.getElementById("empty-state");
        const loadingState = document.getElementById("loading-state");
        const errorState = document.getElementById("error-state");
        const retryButton = document.getElementById("retry-button");

        const promptInput = document.getElementById("code-prompt");
        const runButton = document.getElementById("run-button");
        const cancelButton = document.getElementById("cancel-button");
        const applyButton = document.getElementById("apply-button");
        const retryEventButton = document.getElementById("retry-event-button");

        let currentMode = "explain";
        let latestCodeState = {
            canRun: false,
            canCancel: false,
            canApply: false,
            canRetryEventWrite: false,
        };

        retryButton.addEventListener("click", () => {
            vscode.postMessage({ type: "refresh" });
        });

        modeExplainButton.addEventListener("click", () => {
            vscode.postMessage({ type: "setMode", mode: "explain" });
        });

        modeCodeButton.addEventListener("click", () => {
            vscode.postMessage({ type: "setMode", mode: "code" });
        });

        promptInput.addEventListener("input", () => {
            syncCodeButtons();
        });

        runButton.addEventListener("click", () => {
            vscode.postMessage({
                type: "runTask",
                prompt: promptInput.value,
            });
        });

        cancelButton.addEventListener("click", () => {
            vscode.postMessage({ type: "cancelTask" });
        });

        applyButton.addEventListener("click", () => {
            vscode.postMessage({ type: "applyTask" });
        });

        retryEventButton.addEventListener("click", () => {
            vscode.postMessage({ type: "retryEventWrite" });
        });

        window.addEventListener("message", (event) => {
            const message = event.data;
            switch (message.type) {
                case "mode:update":
                    renderMode(message.mode);
                    break;
                case "code:update":
                    renderCode(message.data);
                    break;
                case "state:empty":
                    showEmpty(message.message);
                    break;
                case "state:loading":
                    showLoading(message.label);
                    break;
                case "state:error":
                    showError(message.error, message.baseUrl);
                    break;
                case "state:update":
                    renderContent(message.data);
                    break;
                default:
                    break;
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            vscode.postMessage({ type: "ready" });
        });

        function renderMode(mode) {
            currentMode = mode;
            modeExplainButton.classList.toggle("active", mode === "explain");
            modeCodeButton.classList.toggle("active", mode === "code");
            explainPanel.classList.toggle("hidden", mode !== "explain");
            codePanel.classList.toggle("hidden", mode !== "code");
        }

        function renderCode(data) {
            latestCodeState = data;
            document.getElementById("code-file-path").textContent = data.filePath || "No file selected.";
            document.getElementById("code-status").textContent = data.message || "";
            document.getElementById("code-output").textContent = data.streamedText || "";
            syncCodeButtons();
        }

        function syncCodeButtons() {
            const hasPrompt = promptInput.value.trim().length > 0;
            runButton.disabled = !latestCodeState.canRun || !hasPrompt;
            cancelButton.disabled = !latestCodeState.canCancel;
            applyButton.disabled = !latestCodeState.canApply;
            retryEventButton.disabled = !latestCodeState.canRetryEventWrite;
        }

        function hideAllStates() {
            content.classList.add("hidden");
            emptyState.classList.add("hidden");
            loadingState.classList.add("hidden");
            errorState.classList.add("hidden");
        }

        function showEmpty(message) {
            hideAllStates();
            document.getElementById("empty-text").textContent = message;
            emptyState.classList.remove("hidden");
        }

        function showLoading(label) {
            hideAllStates();
            const loadingText = label ? `Loading ${label}...` : "Loading...";
            document.getElementById("loading-text").textContent = loadingText;
            loadingState.classList.remove("hidden");
        }

        function showError(error, baseUrl) {
            hideAllStates();
            document.getElementById("error-text").textContent = formatError(error, baseUrl);
            errorState.classList.remove("hidden");
        }

        function renderContent(data) {
            hideAllStates();
            content.classList.remove("hidden");

            document.getElementById("entity-name").textContent = data.entityName;
            document.getElementById("entity-type").textContent = data.entityType;
            document.getElementById("entity-location").textContent = formatLocation(data.filePath, data.lineStart, data.lineEnd);

            const signature = document.getElementById("entity-signature");
            toggleText(signature, data.signature);

            const eventCount = document.getElementById("event-count");
            eventCount.textContent = `${data.eventCount} events recorded`;

            const summary = document.getElementById("summary-text");
            const detail = document.getElementById("detail-text");
            const hasDistinctDetail =
                data.detailedExplanation &&
                data.detailedExplanation.trim().length > 0 &&
                data.detailedExplanation.trim() !== data.summary.trim();

            toggleText(summary, data.summary);
            toggleText(detail, hasDistinctDetail ? data.detailedExplanation : null);

            renderTimeline(data.timeline, data.historyAvailable);
            renderRelatedEntities(data.relatedEntities);
        }

        function renderTimeline(timeline, historyAvailable) {
            const list = document.getElementById("timeline-list");
            const fallback = document.getElementById("history-fallback");
            list.replaceChildren();

            if (!historyAvailable) {
                fallback.classList.remove("hidden");
                return;
            }

            fallback.classList.add("hidden");

            if (!timeline.length) {
                const item = document.createElement("li");
                item.className = "timeline-item muted";
                item.textContent = "No recorded events.";
                list.appendChild(item);
                return;
            }

            for (const entry of timeline) {
                const item = document.createElement("li");
                item.className = "timeline-item";

                const topRow = document.createElement("div");
                topRow.className = "row";

                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = entry.actionType;

                const timestamp = document.createElement("span");
                timestamp.className = "muted";
                timestamp.textContent = formatTimestamp(entry.timestamp);

                topRow.appendChild(badge);
                topRow.appendChild(timestamp);

                const intent = document.createElement("p");
                intent.textContent = entry.intent;

                item.appendChild(topRow);
                item.appendChild(intent);

                if (entry.renameLabel) {
                    const rename = document.createElement("p");
                    rename.className = "muted";
                    rename.textContent = entry.renameLabel;
                    item.appendChild(rename);
                }

                list.appendChild(item);
            }
        }

        function renderRelatedEntities(relatedEntities) {
            const list = document.getElementById("related-list");
            const empty = document.getElementById("related-empty");
            list.replaceChildren();

            if (!relatedEntities.length) {
                empty.classList.remove("hidden");
                return;
            }

            empty.classList.add("hidden");
            for (const related of relatedEntities) {
                const item = document.createElement("li");
                item.className = "related-item";

                const button = document.createElement("button");
                button.type = "button";
                button.className = "link-button";
                button.textContent = related.label;
                button.addEventListener("click", () => {
                    vscode.postMessage({
                        type: "openRelatedEntity",
                        entityId: related.entityId,
                    });
                });

                const meta = document.createElement("p");
                meta.className = "muted";
                meta.textContent = related.relationLabel || related.qualifiedName;

                item.appendChild(button);
                item.appendChild(meta);
                list.appendChild(item);
            }
        }

        function toggleText(element, value) {
            if (value && value.trim().length > 0) {
                element.textContent = value;
                element.classList.remove("hidden");
                return;
            }
            element.textContent = "";
            element.classList.add("hidden");
        }

        function formatLocation(filePath, lineStart, lineEnd) {
            if (lineStart === null || lineEnd === null) {
                return filePath;
            }
            if (lineStart === lineEnd) {
                return `${filePath}:${lineStart}`;
            }
            return `${filePath}:${lineStart}-${lineEnd}`;
        }

        function formatTimestamp(value) {
            const parsed = new Date(value);
            return Number.isNaN(parsed.getTime()) ? value : parsed.toLocaleString();
        }

        function formatError(error, baseUrl) {
            switch (error) {
                case "backend_unavailable":
                    return `Cannot connect to TailEvents backend. Make sure the server is running at ${baseUrl}.`;
                case "entity_not_found":
                    return "No indexed entity found at this location.";
                case "timeout":
                    return "Request timed out. The backend may be busy generating an explanation.";
                default:
                    return "Something went wrong.";
            }
        }
    </script>
</body>
</html>
